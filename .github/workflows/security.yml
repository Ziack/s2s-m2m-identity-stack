name: security

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  npm-audit:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/auth-library
          - packages/cedar-policies
          - packages/create-service
          - packages/token-broker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: audit
        id: audit
        working-directory: ${{ matrix.workspace }}
        run: |
          npm install --package-lock-only
          npm audit --audit-level=critical --json > audit.json || true
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit.json)
          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
      - name: open issue if critical
        if: steps.audit.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `npm audit: critical vulnerability in ${{ matrix.workspace }}`,
              body: `Weekly scan found critical vulnerabilities in \`${{ matrix.workspace }}\`. Check the latest [security workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['security', 'automated']
            });

  trivy-broker:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'ghcr.io/ziack/s2s-token-broker:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
          output: 'trivy-broker.txt'
      - name: upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-broker
          path: trivy-broker.txt
      - name: open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `trivy: critical/high CVEs in s2s-token-broker:latest`,
              body: `Weekly broker image scan failed. See workflow run for trivy-broker.txt artifact.`,
              labels: ['security', 'automated']
            });

  provider-freshness:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: check AWS provider pin
        run: |
          PINNED=$(grep -rEh 'version\s*=\s*"~>\s*5\.[0-9]+"' modules/*/versions.tf | head -1 | grep -oE '5\.[0-9]+')
          LATEST=$(curl -s https://registry.terraform.io/v1/providers/hashicorp/aws | jq -r .version | grep -oE '^5\.[0-9]+')
          echo "pinned=$PINNED, latest=$LATEST"
          PINNED_MINOR="${PINNED#5.}"
          LATEST_MINOR="${LATEST#5.}"
          if [ $((LATEST_MINOR - PINNED_MINOR)) -ge 6 ]; then
            echo "::warning::AWS provider pinned to $PINNED but latest is $LATEST (6+ minors behind)"
            exit 1
          fi
      - name: open issue on stale
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AWS provider pin is 6+ minors behind upstream`,
              body: `The AWS provider pin in \`modules/*/versions.tf\` is stale. See [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['security', 'dependencies', 'automated']
            });

  cedar-freshness:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: compare cedar-wasm version
        working-directory: packages/cedar-policies
        run: |
          PINNED=$(jq -r '.dependencies["@cedar-policy/cedar-wasm"] // .devDependencies["@cedar-policy/cedar-wasm"] // ""' package.json | tr -d '^~')
          if [ -z "$PINNED" ]; then
            echo "cedar-wasm not pinned in packages/cedar-policies; skipping"
            exit 0
          fi
          LATEST=$(npm view @cedar-policy/cedar-wasm version)
          echo "pinned=$PINNED latest=$LATEST"
          if [ "$PINNED" != "$LATEST" ]; then
            echo "::warning::cedar-wasm pinned to $PINNED, latest is $LATEST"
          fi
