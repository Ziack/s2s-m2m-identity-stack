name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + assemble, no publish)'
        type: boolean
        default: true

permissions:
  contents: write     # for GitHub Release
  packages: write     # for GHCR push
  id-token: write     # for npm provenance

jobs:
  validate-changelog:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          if [ -n "$GITHUB_REF" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF##refs/tags/}"
          else
            TAG="v0.0.0-dryrun"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: assert CHANGELOG.md has an entry
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md || {
            echo "::error::missing CHANGELOG entry [${VERSION}]"
            exit 1
          }

  publish-npm:
    needs: validate-changelog
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        package:
          - packages/auth-library
          - packages/cedar-policies
          - packages/create-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: install + build
        working-directory: ${{ matrix.package }}
        run: |
          npm install
          npm run build --if-present
      - name: set version
        working-directory: ${{ matrix.package }}
        run: npm version "${{ needs.validate-changelog.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: publish
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: dry-run pack
        if: ${{ inputs.dry_run }}
        working-directory: ${{ matrix.package }}
        run: npm pack --dry-run

  publish-broker:
    needs: validate-changelog
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ !inputs.dry_run }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: packages/token-broker
          push: ${{ !inputs.dry_run }}
          tags: |
            ghcr.io/ziack/s2s-token-broker:${{ needs.validate-changelog.outputs.tag }}
            ghcr.io/ziack/s2s-token-broker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  github-release:
    needs: [validate-changelog, publish-npm, publish-broker]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: extract CHANGELOG section
        id: extract
        run: |
          VERSION="${{ needs.validate-changelog.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; print; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          cat /tmp/release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-changelog.outputs.tag }}
          name: ${{ needs.validate-changelog.outputs.tag }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
